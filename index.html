}

/* ---------------------------------------------------------------------
   تبويب: المعلمون
--------------------------------------------------------------------- */
function TeachersTab({ teachers, setTeachers, onOpenLesson }) {
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [newStage, setNewStage] = useState("tamhidi");
  const [newSubject, setNewSubject] = useState(STAGES.tamhidi.subjects[0]);

  const addTeacher = async () => {
    if (!name.trim()) return;
    setBusy(true);
    const next = [...teachers, { id: `${Date.now()}`, name: name.trim(), assignments: [] }];
    const ok = await storeSet("teachers", next);
    if (ok) { setTeachers(next); setName(""); setExpandedId(next[next.length - 1].id); }
    setBusy(false);
  };
  const removeTeacher = async (id) => { const next = teachers.filter((t) => t.id !== id); const ok = await storeSet("teachers", next); if (ok) setTeachers(next); };
  const addAssignment = async (teacherId) => {
    const next = teachers.map((t) => {
      if (t.id !== teacherId) return t;
      if (t.assignments.some((a) => a.stage === newStage && a.subject === newSubject)) return t;
      return { ...t, assignments: [...t.assignments, { stage: newStage, subject: newSubject }] };
    });
    const ok = await storeSet("teachers", next); if (ok) setTeachers(next);
  };
  const removeAssignment = async (teacherId, stage, subject) => {
    const next = teachers.map((t) => t.id === teacherId ? { ...t, assignments: t.assignments.filter((a) => !(a.stage === stage && a.subject === subject)) } : t);
    const ok = await storeSet("teachers", next); if (ok) setTeachers(next);
  };

  return (
    <div>
      <SectionHeader eyebrow="الكادر" title="المعلمون ودروسهم" />
      <div className="rounded-xl p-3 mb-4" style={{ background: "#FBF7EE", border: "1px dashed #B8863B" }}>
        <span className="block text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>إضافة أستاذ جديد</span>
        <div className="flex gap-2">
          <input className={selectCls} style={selectStyle} placeholder="اسم الأستاذ" value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addTeacher()} />
          <button onClick={addTeacher} disabled={busy} className="px-4 rounded-lg shrink-0 flex items-center justify-center" style={{ background: "#1F3A34", color: "#F3EAD8" }}>{busy ? <Loader2 size={18} className="animate-spin" /> : <Plus size={18} />}</button>
        </div>
      </div>
      {teachers.length === 0 && <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا يوجد أساتذة مسجّلون بعد.</p>}
      <div className="space-y-3">
        {teachers.map((t) => {
          const open = expandedId === t.id;
          return (
            <div key={t.id} className="rounded-xl overflow-hidden" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <button onClick={() => setExpandedId(open ? null : t.id)} className="w-full flex items-center justify-between px-3 py-3">
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: "#1F3A34" }}><UserCog size={16} style={{ color: "#B8863B" }} /></div>
                  <div className="text-right"><div className="font-bold" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: 16 }}>{t.name}</div><div className="text-[11px]" style={{ color: "#8A7E68" }}>{t.assignments.length} درسًا</div></div>
                </div>
                <ChevronLeft size={18} style={{ color: "#B3A688", transform: open ? "rotate(-90deg)" : "none" }} />
              </button>
              {open && (
                <div className="px-3 pb-3">
                  {t.assignments.length > 0 && (
                    <div className="flex flex-col gap-2 mb-3">
                      {t.assignments.map((a) => (
                        <div key={`${a.stage}-${a.subject}`} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: "#F3EAD8" }}>
                          <button onClick={() => onOpenLesson(t, a)} className="text-right flex-1">
                            <span className="text-sm font-bold" style={{ color: "#1F3A34" }}>{a.subject}</span>
                            <span className="text-[11px] block" style={{ color: "#7A2E2E" }}>{STAGES[a.stage].name}</span>
                          </button>
                          <button onClick={() => removeAssignment(t.id, a.stage, a.subject)} style={{ color: "#8B3A3A" }}><Trash2 size={14} /></button>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="rounded-lg p-2.5" style={{ background: "#F3EAD8" }}>
                    <span className="block text-[11px] font-semibold mb-1.5" style={{ color: "#7A2E2E" }}>إضافة درس لهذا الأستاذ</span>
                    <div className="grid grid-cols-2 gap-2 mb-2">
                      <select className={selectCls} style={{ ...selectStyle, background: "#FBF7EE" }} value={newStage} onChange={(e) => { setNewStage(e.target.value); setNewSubject(STAGES[e.target.value].subjects[0]); }}>
                        {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                      </select>
                      <select className={selectCls} style={{ ...selectStyle, background: "#FBF7EE" }} value={newSubject} onChange={(e) => setNewSubject(e.target.value)}>
                        {STAGES[newStage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
                      </select>
                    </div>
                    <button onClick={() => addAssignment(t.id)} className="w-full py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-1" style={{ background: "#1F3A34", color: "#F3EAD8" }}><Plus size={13} /> إضافة الدرس</button>
                  </div>
                  <button onClick={() => removeTeacher(t.id)} className="w-full mt-2 py-2 rounded-lg text-xs font-semibold" style={{ color: "#8B3A3A" }}>حذف هذا الأستاذ</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: سجل الحضور والغياب
--------------------------------------------------------------------- */
function AttendanceTab({ students, stage, setStage, subject, setSubject }) {
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);
  const [studentId, setStudentId] = useState(roster[0]?.id || "");
  const [checkDate, setCheckDate] = useState(todayISO());
  const [month, setMonth] = useState(thisMonthISO());
  const [year, setYear] = useState(thisYear());
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { if (!roster.find((s) => s.id === studentId)) setStudentId(roster[0]?.id || ""); }, [roster, studentId]);
  useEffect(() => {
    let cancelled = false; setLoading(true);
    (async () => {
      const keys = await storeList(`daily:${stage}:${subject}:`);
      const docs = await Promise.all(keys.map((k) => storeGet(k).then((d) => ({ date: k.split(":")[3], rec: d?.[studentId] }))));
      const list = docs.filter((d) => d.rec && d.rec.attendanceCat).map((d) => ({ date: d.date, cat: d.rec.attendanceCat }));
      if (!cancelled) { setEntries(list); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [stage, subject, studentId]);

  const tally = (list) => { const t = { present: 0, late: 0, leave: 0, excused: 0, unexcused: 0 }; list.forEach((e) => { t[e.cat] = (t[e.cat] || 0) + 1; }); return t; };
  const monthEntries = entries.filter((e) => e.date.startsWith(month));
  const yearEntries = entries.filter((e) => e.date.startsWith(year));
  const monthTally = tally(monthEntries);
  const yearTally = tally(yearEntries);
  const todayEntry = entries.find((e) => e.date === checkDate);
  const absenceList = [...yearEntries].filter((e) => e.cat !== "present").sort((a, b) => b.date.localeCompare(a.date));

  const StatGrid = ({ t }) => (
    <div className="grid grid-cols-5 gap-1.5">
      {Object.entries(CAT_LABELS).map(([cat, label]) => (
        <div key={cat} className="rounded-lg py-2 text-center" style={{ background: "#F3EAD8" }}>
          <div className="text-[9px] leading-tight" style={{ color: "#7A2E2E" }}>{label}</div>
          <div className="font-bold text-sm" style={{ color: CAT_COLORS[cat] }}>{t[cat] || 0}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div>
      <SectionHeader eyebrow="الدوام" title="سجل الحضور والغياب" />
      <div className="grid grid-cols-2 gap-2 mb-2">
        <Field label="المرحلة">
          <select className={selectCls} style={selectStyle} value={stage} onChange={(e) => { setStage(e.target.value); setSubject(STAGES[e.target.value].subjects[0]); }}>
            {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="المادة">
          <select className={selectCls} style={selectStyle} value={subject} onChange={(e) => setSubject(e.target.value)}>
            {STAGES[stage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
          </select>
        </Field>
      </div>
      <Field label="الطالب">
        <select className={selectCls} style={selectStyle} value={studentId} onChange={(e) => setStudentId(e.target.value)}>
          {roster.length === 0 && <option value="">لا يوجد طلاب</option>}
          {roster.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </Field>
      {loading ? <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : !studentId ? null : (
        <>
          <Field label="التحقق من يوم محدد"><input type="date" className={selectCls} style={selectStyle} value={checkDate} onChange={(e) => setCheckDate(e.target.value)} /></Field>
          <div className="rounded-lg p-3 mb-4 flex items-center justify-between" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
            <span className="text-xs font-semibold" style={{ color: "#7A2E2E" }}>{weekdayName(checkDate)} · {checkDate} · {hijriLabel(checkDate)}</span>
            {todayEntry ? <span className="text-sm font-bold px-2.5 py-1 rounded-full" style={{ background: `${CAT_COLORS[todayEntry.cat]}22`, color: CAT_COLORS[todayEntry.cat] }}>{CAT_LABELS[todayEntry.cat]}</span> : <span className="text-xs" style={{ color: "#B3A688" }}>لا يوجد تسجيل</span>}
          </div>
          <div className="mb-4">
            <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-bold" style={{ color: "#7A2E2E" }}>الإحصاء الشهري</span><input type="month" className="rounded-lg px-2 py-1 text-xs border" style={selectStyle} value={month} onChange={(e) => setMonth(e.target.value)} /></div>
            <StatGrid t={monthTally} />
          </div>
          <div className="mb-4">
            <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-bold" style={{ color: "#7A2E2E" }}>الإحصاء السنوي</span><input type="text" className="rounded-lg px-2 py-1 text-xs border w-20 text-center" style={selectStyle} value={year} onChange={(e) => setYear(e.target.value)} /></div>
            <StatGrid t={yearTally} />
          </div>
          <span className="block text-xs font-bold mb-2" style={{ color: "#7A2E2E" }}>سجل أيام الغياب والإجازة خلال {year}</span>
          {absenceList.length === 0 ? <p className="text-sm text-center py-6" style={{ color: "#8A7E68" }}>لا يوجد أي تغيّب مسجّل — مواظبة كاملة.</p> : (
            <div className="space-y-1.5">
              {absenceList.map((e) => (
                <div key={e.date} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                  <span className="text-xs font-semibold" style={{ color: "#2B2620" }}>{weekdayName(e.date)} · {e.date} · {hijriLabel(e.date)}</span>
                  <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{ background: `${CAT_COLORS[e.cat]}22`, color: CAT_COLORS[e.cat] }}>{CAT_LABELS[e.cat]}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: الرصد النهائي
--------------------------------------------------------------------- */
function FinalTab({ students, stage, setStage, subject, setSubject, year, setYear }) {
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);
  const key = `final:${stage}:${subject}:${year}`;
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);

  useEffect(() => {
    let cancelled = false; setLoading(true);
    storeGet(key).then((v) => { if (!cancelled) { setData(v || {}); setLoading(false); } });
    return () => { cancelled = true; };
  }, [key]);
  const setField = async (studentId, field, val) => { const next = { ...data, [studentId]: { ...(data[studentId] || {}), [field]: val } }; setData(next); await storeSet(key, next); };
  const computeFinal = (d) => { if (!d || d.monthlyAvg == null || d.finalExam == null || d.tazkiya == null) return null; return Math.round((d.monthlyAvg * 0.55 + d.finalExam * 0.30 + d.tazkiya) * 10) / 10; };
  const resetFinal = async () => { const ok = await storeSet(key, {}); if (ok) setData({}); };

  return (
    <div>
      <SectionHeader eyebrow="نهاية العام" title="الرصد النهائي" />
      <div className="grid grid-cols-2 gap-2 mb-2">
        <Field label="المرحلة">
          <select className={selectCls} style={selectStyle} value={stage} onChange={(e) => { setStage(e.target.value); setSubject(STAGES[e.target.value].subjects[0]); }}>
            {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="المادة">
          <select className={selectCls} style={selectStyle} value={subject} onChange={(e) => setSubject(e.target.value)}>
            {STAGES[stage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
          </select>
        </Field>
      </div>
      <Field label="السنة الدراسية"><input className={selectCls} style={selectStyle} value={year} onChange={(e) => setYear(e.target.value)} placeholder="مثال: 1447" /></Field>
      <ResetButton label="الدرجات النهائية لهذه السنة" onReset={resetFinal} />
      <p className="text-xs mb-3" style={{ color: "#8A7E68" }}>النهائي = (متوسط الشهور × 55%) + (الامتحان النهائي × 30%) + (تزكية الأستاذ من 15)</p>
      {loading ? <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : (
        <div className="space-y-3">
          {roster.map((s) => {
            const d = data[s.id] || {};
            const fin = computeFinal(d);
            return (
              <div key={s.id} className="rounded-xl p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <div className="flex items-center justify-between mb-2"><span className="font-bold" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: "17px" }}>{s.name}</span><Seal score={fin} max={100} /></div>
                <div className="grid grid-cols-3 gap-2">
                  <Field label="متوسط الشهور"><input type="number" min="0" max="100" className="w-full text-center rounded-lg px-1 py-1.5 border text-sm" style={selectStyle} value={d.monthlyAvg ?? ""} onChange={(e) => setField(s.id, "monthlyAvg", e.target.value === "" ? null : Number(e.target.value))} /></Field>
                  <Field label="الامتحان النهائي"><input type="number" min="0" max="100" className="w-full text-center rounded-lg px-1 py-1.5 border text-sm" style={selectStyle} value={d.finalExam ?? ""} onChange={(e) => setField(s.id, "finalExam", e.target.value === "" ? null : Number(e.target.value))} /></Field>
                  <Field label="تزكية الأستاذ /15"><input type="number" min="0" max="15" className="w-full text-center rounded-lg px-1 py-1.5 border text-sm" style={selectStyle} value={d.tazkiya ?? ""} onChange={(e) => setField(s.id, "tazkiya", e.target.value === "" ? null : Number(e.target.value))} /></Field>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: كشف الدرجات + جدول عدد الحصص الشهري
--------------------------------------------------------------------- */
function ReportTab({ students, stage, setStage, subject, setSubject, month, setMonth }) {
  const [loading, setLoading] = useState(true);
  const [rows, setRows] = useState([]);
  const [sessionsSummary, setSessionsSummary] = useState([]);
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);

  const compute = useCallback(async () => {
    setLoading(true);
    const dailyKeys = await storeList(`daily:${stage}:${subject}:`);
    const monthDailyKeys = dailyKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const dailyDocs = await Promise.all(monthDailyKeys.map((k) => storeGet(k)));
    const reportKeys = await storeList(`weekly:${stage}:${subject}:`);
    const monthReportKeys = reportKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const reportDocs = await Promise.all(monthReportKeys.map((k) => storeGet(k)));
    const wExamKeys = await storeList(`weeklyExam:${stage}:${subject}:`);
    const monthWExamKeys = wExamKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const wExamDocs = await Promise.all(monthWExamKeys.map((k) => storeGet(k)));
    const examDoc = await storeGet(`monthly:${stage}:${subject}:${month}`);

    const result = await Promise.all(roster.map(async (s) => {
      const incidents = (await storeGet(`behavior:${stage}:${subject}:${s.id}`)) || [];
      const realRecMap = {};
      monthDailyKeys.forEach((k, idx) => {
        const rec = dailyDocs[idx]?.[s.id];
        if (rec && (rec.attendance != null || rec.excluded)) realRecMap[k.split(":")[3]] = rec;
      });
      const { partVals, mubVals, behVals } = buildDailyStats(month, realRecMap, incidents);
      const myDates = Object.keys(realRecMap);
      const partPct = avg(partVals);
      const mubPct = avg(mubVals);
      const behPct = avg(behVals);
      const reportAvg = avg(reportDocs.map((d) => d?.[s.id]).filter((v) => v != null));
      const wExamAvg = avg(wExamDocs.map((d) => d?.[s.id]).filter((v) => v != null));
      const examScore = examDoc?.[s.id] ?? null;

      const components = [
        partPct != null ? (partPct / PARTICIPATION_MAX) * 100 : null,
        mubPct != null ? (mubPct / MUBAHATHA_MAX) * 100 : null,
        behPct != null ? (behPct / BEHAVIOR_DAILY_MAX) * 100 : null,
        reportAvg != null ? (reportAvg / WEEKLY_REPORT_MAX) * 100 : null,
        wExamAvg != null ? (wExamAvg / WEEKLY_EXAM_MAX) * 100 : null,
      ].filter((v) => v != null);
      const continuous = components.length ? components.reduce((a, b) => a + b, 0) / components.length : null;
      const combined = continuous != null && examScore != null ? continuous + examScore : null;
      const finalGrade = combined != null ? Math.round((combined / 2) * 10) / 10 : null;

      return { id: s.id, name: s.name, examScore, finalGrade, daysCounted: myDates.length, weeksCounted: reportDocs.length };
    }));
    setRows(result);

    const subjSummary = await Promise.all(STAGES[stage].subjects.map(async (subj) => {
      const keys = await storeList(`daily:${stage}:${subj}:`);
      const monthKeys = keys.filter((k) => k.split(":")[3]?.startsWith(month));
      const ds = monthKeys.map((k) => k.split(":")[3]).sort();
      return { subject: subj, count: ds.length, dates: ds };
    }));
    setSessionsSummary(subjSummary);
    setLoading(false);
  }, [stage, subject, month, roster]);

  useEffect(() => { compute(); }, [compute]);
  const totalSessions = sessionsSummary.reduce((a, s) => a + s.count, 0);

  return (
    <div>
      <SectionHeader eyebrow="كشف" title="كشف الدرجات الشهري" />
      <div className="grid grid-cols-2 gap-2 mb-2">
        <Field label="المرحلة">
          <select className={selectCls} style={selectStyle} value={stage} onChange={(e) => { setStage(e.target.value); setSubject(STAGES[e.target.value].subjects[0]); }}>
            {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="المادة">
          <select className={selectCls} style={selectStyle} value={subject} onChange={(e) => setSubject(e.target.value)}>
            {STAGES[stage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
          </select>
        </Field>
      </div>
      <Field label="الشهر"><input type="month" className={selectCls} style={selectStyle} value={month} onChange={(e) => setMonth(e.target.value)} /></Field>
      {loading ? <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : (
        <>
          {rows.length === 0 ? <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا يوجد طلاب في هذه المرحلة.</p> : (
            <div className="space-y-3 mb-6">
              {rows.map((r) => (
                <div key={r.id} className="rounded-xl p-3.5 flex items-center justify-between" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                  <div>
                    <span className="font-bold text-lg block" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{r.name}</span>
                    <span className="text-[10px]" style={{ color: "#8A7E68" }}>{r.daysCounted} يومًا مسجّلًا · امتحان شهري: {r.examScore ?? "—"}</span>
                  </div>
                  <Seal score={r.finalGrade} max={100} />
                </div>
              ))}
            </div>
          )}
          <SectionHeader eyebrow="سجل الدوام" title="جدول عدد الحصص هذا الشهر" />
          <div className="rounded-xl p-3 mb-2" style={{ background: "#1F3A34" }}>
            <div className="flex items-center justify-between"><span className="text-xs font-semibold" style={{ color: "#B8863B" }}>إجمالي حصص المرحلة</span><span className="text-xl font-bold" style={{ color: "#F3EAD8", fontFamily: "Amiri, serif" }}>{totalSessions}</span></div>
          </div>
          <div className="space-y-2">
            {sessionsSummary.map((row) => (
              <div key={row.subject} className="rounded-lg p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <div className="flex items-center justify-between mb-1.5"><span className="font-semibold text-sm" style={{ color: "#2B2620" }}>{row.subject}</span><span className="text-sm font-bold" style={{ color: "#B8863B" }}>{row.count} حصة</span></div>
                {row.dates.length > 0 && <div className="flex gap-1 flex-wrap">{row.dates.map((d) => <span key={d} className="text-[10px] px-1.5 py-0.5 rounded" style={{ background: "#F3EAD8", color: "#7A2E2E" }}>{d.slice(5)}</span>)}</div>}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: المناسبات الشهرية (تقويم هجري + شرح المناسبات ونبذ الأئمة)
--------------------------------------------------------------------- */
function OccasionsTab() {
  const todayH = toHijri(new Date());
  const [hy, setHy] = useState(todayH.hy);
  const [hm, setHm] = useState(todayH.hm);
  const [openId, setOpenId] = useState(null);

  const shiftMonth = (delta) => {
    let newHm = hm + delta, newHy = hy;
    if (newHm > 12) { newHm = 1; newHy += 1; }
    if (newHm < 1) { newHm = 12; newHy -= 1; }
    setHm(newHm); setHy(newHy);
  };

  const monthOccasions = OCCASIONS.filter((o) => o.hm === hm);
  const monthClosure = HOLIDAY_MONTHS[hm];

  return (
    <div>
      <SectionHeader eyebrow="التقويم الهجري" title="المناسبات الشهرية" />
      <div className="flex items-center justify-between rounded-xl p-3 mb-4" style={{ background: "#1F3A34" }}>
        <button onClick={() => shiftMonth(-1)} className="w-8 h-8 rounded-full flex items-center justify-center" style={{ background: "#B8863B", color: "#1F3A34" }}>‹</button>
        <span className="font-bold text-lg" style={{ color: "#F3EAD8", fontFamily: "Amiri, serif" }}>{HIJRI_MONTHS[hm - 1]} {hy}هـ</span>
        <button onClick={() => shiftMonth(1)} className="w-8 h-8 rounded-full flex items-center justify-center" style={{ background: "#B8863B", color: "#1F3A34" }}>›</button>
      </div>

      {monthClosure && (
        <div className="rounded-xl p-3 mb-4 flex items-start gap-2.5" style={{ background: "#F7E9E9", border: "1px solid #8B3A3A55" }}>
          <CalendarX size={16} style={{ color: "#8B3A3A" }} className="shrink-0 mt-0.5" />
          <p className="text-xs" style={{ color: "#8B3A3A" }}>{monthClosure}</p>
        </div>
      )}

      {monthOccasions.length === 0 ? (
        <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا توجد مناسبة استشهاد مسجّلة ثابتة اليوم في هذا الشهر (عدا العطلة الأسبوعية إن وُجدت).</p>
      ) : (
        <div className="space-y-2.5">
          {monthOccasions.map((o) => {
            const bio = o.personKey ? IMAM_BIOS[o.personKey] : null;
            const open = openId === o.id;
            const dayLabel = o.dynamic === "lastDay" ? "آخر يوم من الشهر" : `${o.hd} ${HIJRI_MONTHS[hm - 1]}`;
            return (
              <div key={o.id} className="rounded-xl overflow-hidden" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <button onClick={() => setOpenId(open ? null : o.id)} className="w-full flex items-center justify-between px-3.5 py-3 text-right">
                  <div>
                    <span className="font-bold block" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: 16 }}>{o.title}</span>
                    <span className="text-[11px]" style={{ color: "#B8863B" }}>{dayLabel}</span>
                  </div>
                  <ChevronLeft size={16} style={{ color: "#B3A688", transform: open ? "rotate(-90deg)" : "none" }} />
                </button>
                {open && (
                  <div className="px-3.5 pb-4 pt-1" style={{ borderTop: "1px dashed #E7DCC2" }}>
                    {o.note && <p className="text-sm mb-3 leading-relaxed" style={{ color: "#2B2620" }}>{o.note}</p>}
                    {bio && (
                      <>
                        <span className="block text-[11px] font-bold mb-1.5" style={{ color: "#7A2E2E" }}>محطات من حياته (ع)</span>
                        <ul className="mb-3 space-y-1">
                          {bio.stations.map((st, i) => (
                            <li key={i} className="text-sm flex gap-1.5" style={{ color: "#2B2620" }}>
                              <span style={{ color: "#B8863B" }}>•</span><span>{st}</span>
                            </li>
                          ))}
                        </ul>
                        <span className="block text-[11px] font-bold mb-1.5" style={{ color: "#7A2E2E" }}>كيفية الشهادة</span>
                        <p className="text-sm mb-3 leading-relaxed" style={{ color: "#2B2620" }}>{bio.martyrdom}</p>
                        {bio.perpetrator && (
                          <div className="rounded-lg px-3 py-2" style={{ background: "#F7E9E9" }}>
                            <span className="text-[11px] font-bold block mb-0.5" style={{ color: "#8B3A3A" }}>من قاتله (بحسب الرواية الشيعية)</span>
                            <span className="text-sm" style={{ color: "#8B3A3A" }}>{bio.perpetrator}</span>
                          </div>
                        )}
                      </>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <p className="text-[11px] mt-5 flex items-start gap-1.5" style={{ color: "#8A7E68" }}>
        <AlertCircle size={12} className="shrink-0 mt-0.5" /> التحويل الهجري هنا حسابي (تقويم أم القرى) وقد يختلف يومًا واحدًا عن الإعلان الرسمي المعتمد على الرؤية الشرعية للهلال، خصوصًا في رمضان وشوال. كذلك تختلف بعض تواريخ الشهادات بين المصادر التاريخية، وقد اعتُمد هنا التاريخ الأشهر في كل حالة.
      </p>
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: تنزيل الكتب
--------------------------------------------------------------------- */
function BooksTab({ stage, setStage }) {
  const [books, setBooks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [title, setTitle] = useState("");
  const [subject, setSubject] = useState(STAGES.tamhidi.subjects[0]);
  const [url, setUrl] = useState("");
  const [busy, setBusy] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (type, text) => { setToast({ type, text }); setTimeout(() => setToast(null), 3000); };

  useEffect(() => {
    let cancelled = false; setLoading(true);
    storeGet("books").then((v) => { if (!cancelled) { setBooks(v || []); setLoading(false); } });
    return () => { cancelled = true; };
  }, []);
  useEffect(() => { setSubject(STAGES[stage].subjects[0]); }, [stage]);

  const addBook = async () => {
    if (!title.trim() || !url.trim()) return;
    setBusy(true);
    const next = [...books, { id: `${Date.now()}`, title: title.trim(), stage, subject, url: url.trim() }];
    const ok = await storeSet("books", next);
    if (ok) { setBooks(next); setTitle(""); setUrl(""); showToast("ok", "تمت إضافة الكتاب بنجاح"); }
    else showToast("error", "فشل الحفظ — تحقق من الاتصال.");
    setBusy(false);
  };
  const removeBook = async (id) => {
    const next = books.filter((b) => b.id !== id);
    const ok = await storeSet("books", next);
    if (ok) setBooks(next);
  };

  const filtered = books.filter((b) => b.stage === stage);

  return (
    <div>
      <SectionHeader eyebrow="المكتبة" title="تنزيل الكتب" />
      {toast && (
        <div className="rounded-lg px-3 py-2 mb-3 text-xs font-semibold flex items-center gap-1.5"
          style={{ background: toast.type === "ok" ? "#E9F1EC" : "#F7E9E9", color: toast.type === "ok" ? "#3F6B4F" : "#8B3A3A", border: `1px solid ${toast.type === "ok" ? "#3F6B4F55" : "#8B3A3A55"}` }}>
          {toast.type === "ok" ? <Check size={13} /> : <AlertCircle size={13} />} {toast.text}
        </div>
      )}
      <Field label="المرحلة">
        <select className={selectCls} style={selectStyle} value={stage} onChange={(e) => setStage(e.target.value)}>
          {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
        </select>
      </Field>
      <div className="rounded-xl p-3 mb-5" style={{ background: "#FBF7EE", border: "1px dashed #B8863B" }}>
        <span className="block text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>إضافة كتاب جديد</span>
        <Field label="اسم الكتاب">
          <input className={selectCls} style={selectStyle} placeholder="مثال: منهاج الصالحين — الجزء الأول" value={title} onChange={(e) => setTitle(e.target.value)} />
        </Field>
        <Field label="المادة">
          <select className={selectCls} style={selectStyle} value={subject} onChange={(e) => setSubject(e.target.value)}>
            {STAGES[stage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
          </select>
        </Field>
        <Field label="رابط التنزيل (Google Drive أو أي رابط مباشر)">
          <input className={selectCls} style={selectStyle} placeholder="https://..." value={url} onChange={(e) => setUrl(e.target.value)} />
        </Field>
        <button onClick={addBook} disabled={busy || !title.trim() || !url.trim()} className="w-full py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-1.5"
          style={{ background: "#1F3A34", color: "#F3EAD8", opacity: !title.trim() || !url.trim() ? 0.5 : 1 }}>
          {busy ? <Loader2 size={16} className="animate-spin" /> : <Plus size={16} />} إضافة الكتاب
        </button>
      </div>

      {loading ? (
        <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : filtered.length === 0 ? (
        <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا توجد كتب مضافة لهذه المرحلة بعد.</p>
      ) : (
        <div className="space-y-2">
          {filtered.map((b) => (
            <div key={b.id} className="rounded-lg p-3 flex items-center justify-between gap-2" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <div className="min-w-0 flex-1">
                <span className="font-bold block truncate" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: 15 }}>{b.title}</span>
                <span className="text-[11px]" style={{ color: "#7A2E2E" }}>{b.subject}</span>
              </div>
              <div className="flex items-center gap-1.5 shrink-0">
                <a href={b.url} target="_blank" rel="noopener noreferrer" className="px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1" style={{ background: "#1F3A34", color: "#F3EAD8" }}>
                  <Download size={13} /> تنزيل
                </a>
                <button onClick={() => removeBook(b.id)} className="p-2 rounded-lg" style={{ color: "#8B3A3A" }}><Trash2 size={15} /></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const monthItems = items.filter((i) => i.date.startsWith(month));
  const monthTotal = monthItems.reduce((a, i) => a + i.amount, 0);

  return (

    const next = [{ id: `${Date.now()}`, applicant: applicant.trim(), aidType: aidType.trim(), amount: amount ? Number(amount) : null, status, date, note: note.trim() }, ...items];
    const ok = await storeSet("aid", next);
    if (ok) { setItems(next); setApplicant(""); setAidType(""); setAmount(""); setNote(""); }
    setBusy(false);
  };
  const updateStatus = async (id, newStatus) => {
    const next = items.map((i) => i.id === id ? { ...i, status: newStatus } : i);
    const ok = await storeSet("aid", next);
    if (ok) setItems(next);
  };
  const removeItem = async (id) => { const next = items.filter((i) => i.id !== id); const ok = await storeSet("aid", next); if (ok) setItems(next); };

  return (
    <div>
      <SectionHeader eyebrow="المساعدات" title="المساعدات الاجتماعية والخيرية" onBack={onBack} />
      <div className="rounded-xl p-3 mb-5" style={{ background: "#FBF7EE", border: "1px dashed #B8863B" }}>
        <span className="block text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>تسجيل طلب مساعدة</span>
        <Field label="اسم صاحب الطلب"><input className={selectCls} style={selectStyle} value={applicant} onChange={(e) => setApplicant(e.target.value)} /></Field>
        <Field label="نوع المساعدة"><input className={selectCls} style={selectStyle} placeholder="مثال: إيجار، علاج، معونة شهرية" value={aidType} onChange={(e) => setAidType(e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-2">
          <Field label="المبلغ (إن وُجد)"><input type="number" className={selectCls} style={selectStyle} value={amount} onChange={(e) => setAmount(e.target.value)} /></Field>
          <Field label="التاريخ"><input type="date" className={selectCls} style={selectStyle} value={date} onChange={(e) => setDate(e.target.value)} /></Field>
        </div>
        <Field label="الحالة">
          <select className={selectCls} style={selectStyle} value={status} onChange={(e) => setStatus(e.target.value)}>
            {AID_STATUSES.map((s) => <option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="ملاحظة"><input className={selectCls} style={selectStyle} value={note} onChange={(e) => setNote(e.target.value)} /></Field>
        <button onClick={addItem} disabled={busy || !applicant.trim()} className="w-full py-2.5 rounded-lg font-bold text-sm" style={{ background: "#1F3A34", color: "#F3EAD8", opacity: !applicant.trim() ? 0.5 : 1 }}>
          {busy ? "..." : "تسجيل"}
        </button>
      </div>
      {loading ? <div className="flex justify-center py-8"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : items.length === 0 ? (
        <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا توجد طلبات مسجّلة.</p>
      ) : (
        <div className="space-y-2">
          {items.map((i) => (
            <div key={i.id} className="rounded-lg p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="font-bold" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{i.applicant}</span>
                <button onClick={() => removeItem(i.id)} style={{ color: "#8B3A3A" }}><Trash2 size={15} /></button>
              </div>
              <p className="text-xs mb-2" style={{ color: "#7A2E2E" }}>{i.aidType}{i.amount ? ` · ${i.amount.toLocaleString()}` : ""} · {i.date}</p>
              <div className="flex gap-1.5 flex-wrap">
                {AID_STATUSES.map((s) => (
                  <Chip key={s} active={i.status === s} activeColor={AID_STATUS_COLORS[s]} onClick={() => updateStatus(i.id, s)}>{s}</Chip>
                ))}
              </div>
              {i.note && <p className="text-xs mt-1.5" style={{ color: "#8A7E68" }}>{i.note}</p>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   وحدة: جدولة الفعاليات والمناسبات العامة
--------------------------------------------------------------------- */
function EventsModule({ onBack }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [title, setTitle] = useState("");
  const [date, setDate] = useState(todayISO());
  const [location, setLocation] = useState("");
  const [desc, setDesc] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    let cancelled = false; setLoading(true);
    storeGet("events").then((v) => { if (!cancelled) { setItems(v || []); setLoading(false); } });
    return () => { cancelled = true; };
  }, []);

  const addItem = async () => {
    if (!title.trim() || !date) return;
    setBusy(true);
    const next = [...items, { id: `${Date.now()}`, title: title.trim(), date, location: location.trim(), desc: desc.trim() }];
    const ok = await storeSet("events", next);
    if (ok) { setItems(next); setTitle(""); setLocation(""); setDesc(""); }
    setBusy(false);
  };
  const removeItem = async (id) => { const next = items.filter((i) => i.id !== id); const ok = await storeSet("events", next); if (ok) setItems(next); };
  const sorted = [...items].sort((a, b) => a.date.localeCompare(b.date));

  return (
    <div>
      <SectionHeader eyebrow="التقويم" title="جدولة الفعاليات والمناسبات" onBack={onBack} />
      <div className="rounded-xl p-3 mb-5" style={{ background: "#FBF7EE", border: "1px dashed #B8863B" }}>
        <span className="block text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>إضافة فعالية</span>
        <Field label="العنوان"><input className={selectCls} style={selectStyle} value={title} onChange={(e) => setTitle(e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-2">
          <Field label="التاريخ"><input type="date" className={selectCls} style={selectStyle} value={date} onChange={(e) => setDate(e.target.value)} /></Field>
          <Field label="المكان"><input className={selectCls} style={selectStyle} value={location} onChange={(e) => setLocation(e.target.value)} /></Field>
        </div>
        <Field label="وصف"><textarea className={selectCls} style={{ ...selectStyle, minHeight: 60 }} value={desc} onChange={(e) => setDesc(e.target.value)} /></Field>
        <button onClick={addItem} disabled={busy || !title.trim()} className="w-full py-2.5 rounded-lg font-bold text-sm" style={{ background: "#1F3A34", color: "#F3EAD8", opacity: !title.trim() ? 0.5 : 1 }}>
          {busy ? "..." : "إضافة"}
        </button>
      </div>
      {loading ? <div className="flex justify-center py-8"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : sorted.length === 0 ? (
        <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا توجد فعاليات مجدولة بعد.</p>
      ) : (
        <div className="space-y-2">
          {sorted.map((i) => (
            <div key={i.id} className="rounded-lg p-3 flex items-start justify-between gap-2" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <div className="min-w-0">
                <span className="font-bold block" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{i.title}</span>
                <span className="text-xs" style={{ color: "#7A2E2E" }}>{i.date}{i.location ? ` · ${i.location}` : ""}</span>
                {i.desc && <p className="text-xs mt-1" style={{ color: "#8A7E68" }}>{i.desc}</p>}
              </div>
              <button onClick={() => removeItem(i.id)} className="p-1.5 rounded shrink-0" style={{ color: "#8B3A3A" }}><Trash2 size={15} /></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   الواجهة الرئيسية: النظام الشامل لوكيل المرجعية
--------------------------------------------------------------------- */
const SYSTEM_MODULES = [
  { key: "school", label: "مدرسة الفضيل بن يسار البصري", icon: BookOpen, color: "#1F3A34" },
  { key: "husseiniya", label: "إدارة الحسينية والمسجد", icon: Landmark, color: "#4A6FA5" },
  { key: "finance", label: "الحسابات المالية والخمس", icon: Wallet, color: "#B8863B" },
  { key: "believers", label: "قاعدة بيانات المؤمنين", icon: Users, color: "#3F6B4F" },
  { key: "aid", label: "المساعدات الاجتماعية والخيرية", icon: HeartHandshake, color: "#8B3A3A" },
  { key: "events", label: "جدولة الفعاليات والمناسبات", icon: CalendarDays, color: "#7A2E2E" },
];

function Dashboard({ onOpen }) {
  return (
    <div>
      <div className="flex flex-col items-center text-center mb-7">
        <div className="w-16 h-16 rounded-full flex items-center justify-center mb-3" style={{ background: "#1F3A34" }}>
          <Landmark size={28} style={{ color: "#B8863B" }} />
        </div>
        <h1 className="font-bold text-xl" style={{ fontFamily: "Amiri, serif", color: "#1F3A34" }}>النظام الشامل لوكيل المرجعية</h1>
        <p className="text-xs mt-1" style={{ color: "#B8863B" }}>لوحة التحكم الرئيسية</p>
      </div>
      <div className="space-y-3">
        {SYSTEM_MODULES.map((m) => (
          <button key={m.key} onClick={() => onOpen(m.key)} className="w-full flex items-center gap-3 rounded-xl p-4" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
            <div className="w-11 h-11 rounded-full flex items-center justify-center shrink-0" style={{ background: m.color }}>
              <m.icon size={19} style={{ color: "#F3EAD8" }} />

            <span className="font-bold text-base" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{m.label}</span>

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("خطأ في وحدة:", this.props.label, error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ direction: "rtl", textAlign: "right", padding: 16, background: "#F7E9E9", border: "1px solid #8B3A3A55", borderRadius: 12, color: "#8B3A3A", fontFamily: "Cairo, sans-serif" }}>
          <p style={{ fontWeight: "bold", marginBottom: 6 }}>حدث خطأ في وحدة: {this.props.label}</p>
          <p style={{ fontSize: 12, whiteSpace: "pre-wrap" }}>{String(this.state.error && this.state.error.message || this.state.error)}</p>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [activeModule, setActiveModule] = useState(null);

  if (activeModule === "school") {
    return (
      <div>
        <div className="max-w-md mx-auto px-4 pt-3 no-print">
          <button onClick={() => setActiveModule(null)} className="flex items-center gap-1 text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>
            <ArrowRight size={13} /> رجوع للنظام الشامل
          </button>
        </div>
        <ErrorBoundary label="مدرسة الفضيل بن يسار"><SchoolModule /></ErrorBoundary>
      </div>
    );
  }

  return (
    <div dir="rtl" className="min-h-screen" style={{ background: "#F3EAD8", fontFamily: "Cairo, sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap');`}</style>
      <main className="px-4 pt-8 pb-8 max-w-md mx-auto w-full">
        {activeModule === null && <Dashboard onOpen={setActiveModule} />}
        {activeModule === "husseiniya" && <ErrorBoundary label="إدارة الحسينية والمسجد"><HusseiniyaModule onBack={() => setActiveModule(null)} /></ErrorBoundary>}
        {activeModule === "finance" && <ErrorBoundary label="الحسابات المالية والخمس"><FinanceModule onBack={() => setActiveModule(null)} /></ErrorBoundary>}
        {activeModule === "believers" && <ErrorBoundary label="قاعدة بيانات المؤمنين"><BelieversModule onBack={() => setActiveModule(null)} /></ErrorBoundary>}
        {activeModule === "aid" && <ErrorBoundary label="المساعدات الاجتماعية والخيرية"><AidModule onBack={() => setActiveModule(null)} /></ErrorBoundary>}
        {activeModule === "events" && <ErrorBoundary label="جدولة الفعاليات والمناسبات"><EventsModule onBack={() => setActiveModule(null)} /></ErrorBoundary>}
      </main>
    </div>
  );
}




try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
} catch (e) {
  document.getElementById("root").innerHTML =
    '<div style="direction:rtl;text-align:right;padding:20px;font-family:sans-serif;color:#8B3A3A;background:#F7E9E9;white-space:pre-wrap;">حدث خطأ عند تشغيل البرنامج:\n\n' +
    (e && e.stack ? e.stack : String(e)) + '</div>';
}
window.addEventListener("error", function (e) {
  const el = document.createElement("div");
  el.style.cssText = "direction:rtl;text-align:right;padding:16px;font-family:sans-serif;color:#8B3A3A;background:#F7E9E9;border-top:2px solid #8B3A3A;white-space:pre-wrap;position:relative;z-index:9999;";
  el.textContent = "خطأ غير متوقع: " + (e.message || e.error) + "\n" + (e.filename || "") + ":" + (e.lineno || "");
  document.body.appendChild(el);
});
window.addEventListener("unhandledrejection", function (e) {
  const el = document.createElement("div");
  el.style.cssText = "direction:rtl;text-align:right;padding:16px;font-family:sans-serif;color:#8B3A3A;background:#F7E9E9;border-top:2px solid #8B3A3A;white-space:pre-wrap;position:relative;z-index:9999;";
  el.textContent = "خطأ غير متزامن (Promise): " + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
  document.body.appendChild(el);
});
</script>
</body>
