// عطلتا العيدين (تُضافان إلى أيام التعطيل)
const EID_RANGES = [
  { hm: 10, from: 1, to: 9, title: "عطلة عيد الفطر السعيد" },
  { hm: 12, from: 9, to: 30, title: "عطلة عيد الأضحى المبارك (تمتد حتى محرم)" },
];
function getEidForDate(h) { return EID_RANGES.find((e) => e.hm === h.hm && h.hd >= e.from && h.hd <= e.to) || null; }

function isSchoolDay(dateStr) { if (!dateStr) return false; return SCHOOL_WEEKDAYS.includes(new Date(dateStr + "T00:00:00").getDay()); }
function weekdayName(dateStr) { if (!dateStr) return ""; return WEEKDAY_NAMES[new Date(dateStr + "T00:00:00").getDay()]; }

function toHijri(dateOrStr) {
  const date = typeof dateOrStr === "string" ? new Date(dateOrStr + "T00:00:00") : dateOrStr;
  try {
    const parts = new Intl.DateTimeFormat("en-u-ca-islamic-umalqura", { year: "numeric", month: "numeric", day: "numeric" }).formatToParts(date);
    const get = (t) => parseInt(parts.find((p) => p.type === t)?.value, 10);
    return { hy: get("year"), hm: get("month"), hd: get("day") };
  } catch { return { hy: 0, hm: 0, hd: 0 }; }
}
function hijriLabel(dateOrStr) {
  const h = toHijri(dateOrStr);
  if (!h.hm) return "";
  return `${h.hd} ${HIJRI_MONTHS[h.hm - 1]} ${h.hy}هـ`;
}
function getOccasionsForDate(dateOrStr) {
  const date = typeof dateOrStr === "string" ? new Date(dateOrStr + "T00:00:00") : dateOrStr;
  const h = toHijri(date);
  const nextDay = new Date(date.getTime() + 86400000);
  const hNext = toHijri(nextDay);
  const isLastDay = h.hm !== hNext.hm;
  return OCCASIONS.filter((o) => (o.dynamic === "lastDay" ? o.hm === h.hm && isLastDay : o.hm === h.hm && o.hd === h.hd));
}
function holidayReason(dateStr) {
  if (!dateStr) return null;
  const date = new Date(dateStr + "T00:00:00");
  const occ = getOccasionsForDate(date);
  const h = toHijri(date);
  if (occ.length) return { type: "occasion", occasions: occ };
  const eid = getEidForDate(h);
  if (eid) return { type: "eid", text: eid.title };
  if (!SCHOOL_WEEKDAYS.includes(date.getDay())) return { type: "weekend" };
  if (HOLIDAY_MONTHS[h.hm]) return { type: "month", text: HOLIDAY_MONTHS[h.hm] };
  return null;
}
function isSchoolDayFull(dateStr) { return holidayReason(dateStr) === null; }

// أيام التعطيل تُحتسب فيها الدرجات كاملة تلقائيًا، باستثناء محرم ورمضان وعطلة الأسبوع (الخميس والجمعة)
function fullCreditEligible(dateStr) {
  const holiday = holidayReason(dateStr);
  if (!holiday) return false;
  if (holiday.type === "weekend") return false;
  const h = toHijri(dateStr);
  if (h.hm === 1 || h.hm === 9) return false;
  return true;
}
function daysInMonthList(monthStr) {
  const [y, m] = monthStr.split("-").map(Number);
  const count = new Date(y, m, 0).getDate();
  const list = [];
  for (let d = 1; d <= count; d++) list.push(`${monthStr}-${String(d).padStart(2, "0")}`);
  return list;
}
// يبني مصفوفات القيم اليومية للمشاركة والمباحثة والسلوك خلال شهر معيّن، ويضيف درجة كاملة تلقائيًا
// في أيام التعطيل المؤهّلة التي لم تُسجَّل فيها حصة فعليًا (بحسب قاعدة fullCreditEligible أعلاه)
function buildDailyStats(monthStr, realRecMap, incidents) {
  const partVals = [], mubVals = [], behVals = [];
  for (const date of daysInMonthList(monthStr)) {
    const rec = realRecMap[date];
    if (rec && rec.excluded) {
      // مستبعد صراحة من الاحتساب — لا يُضاف شيء له
      continue;
    } else if (rec) {
      if (rec.participation != null) partVals.push(rec.participation);
      if (rec.mubahatha != null) mubVals.push(rec.mubahatha);
      behVals.push(behaviorScoreForDate(incidents, date));
    }
    // لا احتساب تلقائي لأيام العطل بلا تسجيل فعلي — تُستبعد ببساطة من المعدل، تمامًا كالخميس والجمعة ومحرم ورمضان
  }
  return { partVals, mubVals, behVals };
}

function behaviorScoreForDate(incidents, date) {
  const ded = (incidents || []).filter((i) => i.date === date).reduce((a, i) => a + i.severity, 0);
  return Math.max(0, BEHAVIOR_DAILY_MAX - ded);
}
function dailyTotal(rec, behaviorToday) {
  if (!rec || rec.attendance == null) return null;
  const s = (rec.attendance ?? 0) + (rec.participation ?? 0) + (rec.mubahatha ?? 0) + (behaviorToday ?? BEHAVIOR_DAILY_MAX);
  return Math.round(s * 100) / 100;
}

const LS_PREFIX = "madrasa-fudayl:";
let cloudAvailable = null;
async function hasCloud() {
  if (cloudAvailable !== null) return cloudAvailable;
  try {
    if (typeof window !== "undefined" && window.storage && typeof window.storage.set === "function") {
      await window.storage.set("__healthcheck__", "1", false); cloudAvailable = true;
    } else cloudAvailable = false;
  } catch { cloudAvailable = false; }
  return cloudAvailable;
}
async function storeGet(key) {
  if (await hasCloud()) { try { const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; } catch {} }
  try { const raw = localStorage.getItem(LS_PREFIX + key); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
async function storeSet(key, value) {
  if (await hasCloud()) { try { await window.storage.set(key, JSON.stringify(value), false); return true; } catch {} }
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); return true; } catch { return false; }
}
async function storeList(prefix) {
  if (await hasCloud()) { try { const r = await window.storage.list(prefix, false); return r?.keys ?? []; } catch {} }
  try {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(LS_PREFIX + prefix)) keys.push(k.slice(LS_PREFIX.length)); }
    return keys;
  } catch { return []; }
}
async function storageModeLabel() { return (await hasCloud()) ? "سحابي (يتزامن مع حسابك)" : "محلي (على هذا المتصفح والجهاز فقط)"; }

  const color = score == null ? "#B3A688" : pct >= 85 ? "#3F6B4F" : pct >= 70 ? "#B8863B" : pct >= 50 ? "#C08B2C" : "#8B3A3A";
  const dims = size === "sm" ? "w-11 h-11 text-xs" : "w-16 h-16 text-base";
  return (
    <div className={`${dims} rounded-full flex flex-col items-center justify-center font-bold shrink-0`}
      style={{ background: `radial-gradient(circle at 35% 30%, ${color}dd, ${color})`, boxShadow: `0 0 0 2px #F3EAD8, 0 0 0 3px ${color}55, inset 0 2px 3px rgba(255,255,255,0.25)`, color: "#F3EAD8" }}>

}

      <Field label="التحقق من يوم محدد"><input type="date" className={selectCls} style={selectStyle} value={checkDate} onChange={(e) => setCheckDate(e.target.value)} /></Field>
      <div className="rounded-lg p-3 mb-4 flex items-center justify-between" style={{ background: "#F3EAD8", border: "1px solid #E7DCC2" }}>
        <span className="text-xs font-semibold" style={{ color: "#7A2E2E" }}>{weekdayName(checkDate)} · {checkDate} · {hijriLabel(checkDate)}</span>
        {todayEntry ? <span className="text-sm font-bold px-2.5 py-1 rounded-full" style={{ background: `${CAT_COLORS[todayEntry.cat]}22`, color: CAT_COLORS[todayEntry.cat] }}>{CAT_LABELS[todayEntry.cat]}</span> : <span className="text-xs" style={{ color: "#B3A688" }}>لا يوجد تسجيل</span>}
      </div>
      <div className="mb-4">
        <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-bold" style={{ color: "#7A2E2E" }}>الإحصاء الشهري</span><input type="month" className="rounded-lg px-2 py-1 text-xs border" style={selectStyle} value={month} onChange={(e) => setMonth(e.target.value)} /></div>
        <StatGrid t={monthTally} />
      </div>
      <div className="mb-4">
        <div className="flex items-center justify-between mb-1.5"><span className="text-xs font-bold" style={{ color: "#7A2E2E" }}>الإحصاء السنوي</span><input type="text" className="rounded-lg px-2 py-1 text-xs border w-20 text-center" style={selectStyle} value={year} onChange={(e) => setYear(e.target.value)} /></div>
        <StatGrid t={yearTally} />
      </div>
      <span className="block text-xs font-bold mb-2" style={{ color: "#7A2E2E" }}>سجل أيام الغياب والإجازة خلال {year}</span>
      {absenceList.length === 0 ? <p className="text-sm text-center py-6" style={{ color: "#8A7E68" }}>لا يوجد أي تغيّب مسجّل — مواظبة كاملة.</p> : (
        <div className="space-y-1.5">
          {absenceList.map((e) => (
            <div key={e.date} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: "#F3EAD8", border: "1px solid #E7DCC2" }}>
              <span className="text-xs font-semibold" style={{ color: "#2B2620" }}>{weekdayName(e.date)} · {e.date} · {hijriLabel(e.date)}</span>
              <span className="text-[11px] font-bold px-2 py-0.5 rounded-full" style={{ background: `${CAT_COLORS[e.cat]}22`, color: CAT_COLORS[e.cat] }}>{CAT_LABELS[e.cat]}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   تبويب: تسجيل الطلاب
--------------------------------------------------------------------- */
function StudentsTab({ students, setStudents, stage, setStage }) {
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [toast, setToast] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [attSubject, setAttSubject] = useState(STAGES[stage].subjects[0]);
  const showToast = (type, text) => { setToast({ type, text }); setTimeout(() => setToast(null), 3500); };

  const addStudent = async () => {
    if (!name.trim()) return;
    setBusy(true);
    const next = [...students, { id: `${Date.now()}`, name: name.trim(), stage }];
    const ok = await storeSet("students", next);
    if (ok) { setStudents(next); setName(""); showToast("ok", "تم حفظ الطالب بنجاح"); }
    else showToast("error", "فشل الحفظ — تحقق من الاتصال.");
    setBusy(false);
  };
  const removeStudent = async (id) => {
    const next = students.filter((s) => s.id !== id);
    const ok = await storeSet("students", next);
    if (ok) setStudents(next);
  };
  const toggleExpand = (id) => {
    if (expandedId === id) { setExpandedId(null); return; }
    setExpandedId(id); setAttSubject(STAGES[stage].subjects[0]);
  };
  const filtered = students.filter((s) => s.stage === stage);

  return (
    <div>
      <SectionHeader eyebrow="السجل" title="تسجيل الطلاب" />
      {toast && (
        <div className="rounded-lg px-3 py-2 mb-3 text-xs font-semibold flex items-center gap-1.5"
          style={{ background: toast.type === "ok" ? "#E9F1EC" : "#F7E9E9", color: toast.type === "ok" ? "#3F6B4F" : "#8B3A3A", border: `1px solid ${toast.type === "ok" ? "#3F6B4F55" : "#8B3A3A55"}` }}>
          {toast.type === "ok" ? <Check size={13} /> : <AlertCircle size={13} />} {toast.text}
        </div>
      )}
      <Field label="المرحلة">
        <select className={selectCls} style={selectStyle} value={stage} onChange={(e) => { setStage(e.target.value); setExpandedId(null); }}>
          {Object.entries(STAGES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
        </select>
      </Field>
      <div className="rounded-xl p-3 mb-4" style={{ background: "#FBF7EE", border: "1px dashed #B8863B" }}>
        <span className="block text-xs font-semibold mb-2" style={{ color: "#7A2E2E" }}>إضافة طالب جديد</span>
        <div className="flex gap-2">
          <input className={selectCls} style={selectStyle} placeholder="اسم الطالب الكامل" value={name}
            onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addStudent()} />
          <button onClick={addStudent} disabled={busy} className="px-4 rounded-lg shrink-0 flex items-center justify-center" style={{ background: "#1F3A34", color: "#F3EAD8" }}>
            {busy ? <Loader2 size={18} className="animate-spin" /> : <Plus size={18} />}
          </button>
        </div>
      </div>
      <div className="space-y-2">
        {filtered.length === 0 && <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا يوجد طلاب مسجلون في هذه المرحلة بعد.</p>}
        {filtered.map((s, i) => {
          const open = expandedId === s.id;
          return (
            <div key={s.id} className="rounded-lg overflow-hidden" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <button onClick={() => toggleExpand(s.id)} className="w-full flex items-center justify-between px-3 py-2.5">
                <div className="flex items-center gap-2.5">
                  <span className="text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center" style={{ background: "#F3EAD8", color: "#B8863B" }}>{i + 1}</span>
                  <span className="font-semibold" style={{ color: "#2B2620", fontFamily: "Amiri, serif", fontSize: 16 }}>{s.name}</span>
                </div>
                <div className="flex items-center gap-2">
                  <CalendarCheck size={15} style={{ color: open ? "#1F3A34" : "#B3A688" }} />
                  <ChevronLeft size={16} style={{ color: "#B3A688", transform: open ? "rotate(-90deg)" : "none" }} />
                </div>
              </button>
              {open && (
                <div className="px-3 pb-3" style={{ borderTop: "1px dashed #E7DCC2" }}>
                  <div className="flex items-center justify-between pt-3 mb-1">
                    <span className="text-xs font-bold flex items-center gap-1" style={{ color: "#7A2E2E" }}><CalendarCheck size={13} /> الحضور والمعلومات</span>
                    <button onClick={() => removeStudent(s.id)} className="p-1 rounded" style={{ color: "#8B3A3A" }}><Trash2 size={14} /></button>
                  </div>
                  <Field label="المادة">
                    <select className={selectCls} style={selectStyle} value={attSubject} onChange={(e) => setAttSubject(e.target.value)}>
                      {STAGES[stage].subjects.map((sub) => <option key={sub} value={sub}>{sub}</option>)}
                    </select>
                  </Field>
                  <StudentAttendancePanel stage={stage} subject={attSubject} studentId={s.id} />
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   لوحة الدرس — اليومي (مشاركة + مباحثة + سلوك يومي بالخصم)
--------------------------------------------------------------------- */
function LessonDaily({ students, stage, subject }) {
  const [date, setDate] = useState(todayISO());
  const [records, setRecords] = useState({});
  const [behaviorMap, setBehaviorMap] = useState({});
  const [loading, setLoading] = useState(true);
  const [savedFlash, setSavedFlash] = useState(null);
  const [editingBehaviorFor, setEditingBehaviorFor] = useState(null);
  const [severity, setSeverity] = useState(1);
  const [note, setNote] = useState("");
  const [history, setHistory] = useState([]);
  const [historyLoading, setHistoryLoading] = useState(true);
  const [openHistoryDate, setOpenHistoryDate] = useState(null);
  const key = `daily:${stage}:${subject}:${date}`;
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);
  const holiday = holidayReason(date);

  useEffect(() => {
    let cancelled = false; setLoading(true);
    Promise.all([
      storeGet(key),
      Promise.all(roster.map((s) => storeGet(`behavior:${stage}:${subject}:${s.id}`))),
    ]).then(([recs, behaviors]) => {
      if (cancelled) return;
      setRecords(recs || {});
      const map = {};
      roster.forEach((s, i) => { map[s.id] = behaviors[i] || []; });
      setBehaviorMap(map);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [key, stage, subject, roster.length]);

  useEffect(() => {
    let cancelled = false; setHistoryLoading(true);
    (async () => {
      const keys = await storeList(`daily:${stage}:${subject}:`);
      const docs = await Promise.all(keys.map((k) => storeGet(k)));
      const list = keys.map((k, i) => ({ date: k.split(":")[3], recs: docs[i] || {} }))
        .filter((d) => Object.values(d.recs).some((r) => r && (r.attendance != null || r.excluded)))
        .sort((a, b) => b.date.localeCompare(a.date));
      if (!cancelled) { setHistory(list); setHistoryLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [stage, subject, key]); // key يتغيّر أيضًا بعد كل حفظ فيُحدَّث السجل تلقائيًا

  const setField = async (studentId, patch) => {
    const next = { ...records, [studentId]: { ...(records[studentId] || {}), ...patch } };
    setRecords(next);
    const ok = await storeSet(key, next);
    setSavedFlash(ok ? studentId : null);
    setTimeout(() => setSavedFlash(null), 700);
  };
  const setAttendance = (studentId, opt) => setField(studentId, { attendance: opt.v, attendanceCat: opt.cat, excluded: false });

  const addIncident = async (studentId) => {
    const bKey = `behavior:${stage}:${subject}:${studentId}`;
    const entry = { id: `${Date.now()}`, date, severity, points: -severity, note: note.trim() || "بدون وصف" };
    const nextIncidents = [entry, ...(behaviorMap[studentId] || [])];
    const ok = await storeSet(bKey, nextIncidents);
    if (ok) { setBehaviorMap({ ...behaviorMap, [studentId]: nextIncidents }); setEditingBehaviorFor(null); setNote(""); setSeverity(1); }
  };
  const removeIncidentToday = async (studentId, incidentId) => {
    const bKey = `behavior:${stage}:${subject}:${studentId}`;
    const nextIncidents = (behaviorMap[studentId] || []).filter((i) => i.id !== incidentId);
    const ok = await storeSet(bKey, nextIncidents);
    if (ok) setBehaviorMap({ ...behaviorMap, [studentId]: nextIncidents });
  };

  const evaluatedCount = roster.filter((s) => records[s.id]?.attendance != null).length;
  const resetDay = async () => { const ok = await storeSet(key, {}); if (ok) setRecords({}); };

  return (
    <div>
      <Field label="التاريخ">
        <input type="date" className={selectCls} style={selectStyle} value={date} onChange={(e) => setDate(e.target.value)} />
      </Field>
      <ResetButton label="درجات هذا اليوم" onReset={resetDay} />
      {holiday && (
        <div className="rounded-xl p-4 flex items-start gap-2.5 mb-4" style={{ background: "#F7E9E9", border: "1px solid #8B3A3A55" }}>
          <CalendarX size={18} style={{ color: "#8B3A3A" }} className="shrink-0 mt-0.5" />
          <div>
            <p className="text-sm font-bold" style={{ color: "#8B3A3A" }}>{weekdayName(date)} {hijriLabel(date)} — عطلة</p>
            {holiday.type === "weekend" && <p className="text-xs mt-0.5" style={{ color: "#8B3A3A" }}>الدوام من السبت إلى الأربعاء فقط.</p>}
            {holiday.type === "month" && <p className="text-xs mt-0.5" style={{ color: "#8B3A3A" }}>{holiday.text}</p>}
            {holiday.type === "eid" && <p className="text-xs mt-0.5" style={{ color: "#8B3A3A" }}>{holiday.text}</p>}
            {holiday.type === "occasion" && holiday.occasions.map((o) => <p key={o.id} className="text-xs mt-0.5" style={{ color: "#8B3A3A" }}>{o.title}{o.note ? ` — ${o.note}` : ""}</p>)}
            <p className="text-xs mt-1" style={{ color: "#8B3A3A" }}>
              لا تُحتسب أي درجة تلقائيًا في هذا اليوم. إن أقمت درسًا فعليًا وأدخلت درجات هنا يدويًا، فستُحتسب ضمن المعدل الشهري كالمعتاد.
            </p>
          </div>
        </div>
      )}
      <div className="flex items-center justify-between rounded-lg px-3 py-2 mb-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
        <span className="text-xs font-semibold flex items-center gap-1.5" style={{ color: "#7A2E2E" }}><CalendarDays size={13} /> {weekdayName(date)} · {hijriLabel(date)}</span>
        <span className="text-xs font-bold" style={{ color: "#B8863B" }}>تم تقييم {evaluatedCount} / {roster.length}</span>
      </div>
      {roster.length > 0 && (
        <div className="flex gap-1.5 flex-wrap mb-4">
          {roster.map((s) => {
            const done = records[s.id]?.attendance != null;
            return <span key={s.id} className="px-2.5 py-1 rounded-full text-[11px] font-semibold flex items-center gap-1" style={{ background: done ? "#3F6B4F" : "#F3EAD8", color: done ? "#F3EAD8" : "#8A7E68", border: done ? "none" : "1px solid #D9CBAE" }}>{done && <Check size={10} />} {s.name}</span>;
          })}
        </div>
      )}
      {loading ? (
        <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : roster.length === 0 ? (
        <p className="text-sm text-center py-8" style={{ color: "#8A7E68" }}>لا يوجد طلاب في هذه المرحلة بعد.</p>
      ) : (
        <div className="space-y-3">
          {roster.map((s) => {
            const rec = records[s.id] || {};
            const incidents = behaviorMap[s.id] || [];
            const behaviorToday = behaviorScoreForDate(incidents, date);
            const todaysIncidents = incidents.filter((i) => i.date === date);
            const showRest = attendanceShowsRest(rec);
            const total = dailyTotal(rec, behaviorToday);
            const editing = editingBehaviorFor === s.id;
            return (
              <div key={s.id} className="rounded-xl p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <div className="flex items-center justify-between mb-2.5">
                  <span className="font-bold" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: "17px" }}>{s.name}</span>
                  <div className="flex items-center gap-1.5">{savedFlash === s.id && <Check size={14} style={{ color: "#3F6B4F" }} />}<Seal score={total} max={DAILY_MAX_TOTAL} size="sm" /></div>
                </div>
                <div className="flex items-center gap-2 mb-1.5">
                  <div className="flex items-center gap-1 w-[92px] shrink-0 text-xs font-semibold" style={{ color: "#7A2E2E" }}><CalendarCheck size={13} /> الحضور</div>
                  <div className="flex gap-1 flex-wrap">{ATTENDANCE_OPTIONS.map((opt) => <Chip key={opt.v} active={rec.attendance === opt.v} activeColor={CAT_COLORS[opt.cat]} onClick={() => setAttendance(s.id, opt)}>{opt.l}</Chip>)}</div>
                </div>
                {rec.attendanceCat && !showRest && <p className="text-[11px] mt-1 mb-1" style={{ color: "#8A7E68" }}>{CAT_LABELS[rec.attendanceCat]} — لا تُحتسب بقية البنود لهذا اليوم.</p>}
                {showRest && (
                  <>
                    <CounterRow icon={MessageCircle} label="المشاركة اليومية" value={rec.participation} onChange={(v) => setField(s.id, { participation: v })} max={PARTICIPATION_MAX} />
                    <CounterRow icon={BookOpen} label="المباحثة اليومية" value={rec.mubahatha} onChange={(v) => setField(s.id, { mubahatha: v })} max={MUBAHATHA_MAX} />
                    <div className="flex items-center gap-2 mb-1">
                      <div className="flex items-center gap-1 w-[92px] shrink-0 text-xs font-semibold" style={{ color: "#7A2E2E" }}><Heart size={13} /> السلوك اليومي</div>
                      <span className="text-sm font-bold px-2 py-1 rounded-lg" style={{ background: behaviorToday >= BEHAVIOR_DAILY_MAX ? "#E9F1EC" : behaviorToday >= BEHAVIOR_DAILY_MAX * 0.5 ? "#FBF0DD" : "#F7E9E9", color: behaviorToday >= BEHAVIOR_DAILY_MAX ? "#3F6B4F" : behaviorToday >= BEHAVIOR_DAILY_MAX * 0.5 ? "#C08B2C" : "#8B3A3A" }}>{behaviorToday}/{BEHAVIOR_DAILY_MAX}</span>
                      <button onClick={() => setEditingBehaviorFor(editing ? null : s.id)} className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: editing ? "#8B3A3A" : "#F3EAD8", color: editing ? "#F3EAD8" : "#8B3A3A" }}>
                        {editing ? <X size={13} /> : <Plus size={13} />}
                      </button>
                    </div>
                    {todaysIncidents.length > 0 && (
                      <div className="mb-1.5 flex flex-col gap-1">
                        {todaysIncidents.map((i) => (
                          <div key={i.id} className="flex items-center justify-between text-[11px] rounded px-2 py-1" style={{ background: "#F7E9E9", color: "#8B3A3A" }}>
                            <span>-{i.severity} · {i.note}</span>
                            <button onClick={() => removeIncidentToday(s.id, i.id)}><Trash2 size={12} /></button>
                          </div>
                        ))}
                      </div>
                    )}
                    {editing && (
                      <div className="rounded-lg p-2.5 mb-1.5" style={{ background: "#F3EAD8" }}>
                        <div className="flex gap-1.5 mb-2">{BEHAVIOR_SEVERITY.map((sv) => <Chip key={sv.v} active={severity === sv.v} activeColor="#8B3A3A" onClick={() => setSeverity(sv.v)}>{sv.l}</Chip>)}</div>
                        <input className={selectCls} style={{ ...selectStyle, background: "#FBF7EE", marginBottom: 8 }} placeholder="وصف موجز (اختياري)" value={note} onChange={(e) => setNote(e.target.value)} />
                        <button onClick={() => addIncident(s.id)} className="w-full py-2 rounded-lg text-xs font-bold" style={{ background: "#8B3A3A", color: "#F3EAD8" }}>تسجيل الأمر السلبي لهذا اليوم</button>
                      </div>
                    )}
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}

      <span className="block text-xs font-bold mb-2 mt-6" style={{ color: "#7A2E2E" }}>سجل الدرجات اليومية السابقة</span>
      {historyLoading ? (
        <div className="flex justify-center py-6"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : history.length === 0 ? (
        <p className="text-sm text-center py-6" style={{ color: "#8A7E68" }}>لا يوجد سجل درجات سابق بعد.</p>
      ) : (
        <div className="space-y-2">
          {history.map((h) => {
            const open = openHistoryDate === h.date;
            const evaluated = roster.filter((s) => h.recs[s.id]?.attendance != null).length;
            return (
              <div key={h.date} className="rounded-lg overflow-hidden" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <button onClick={() => setOpenHistoryDate(open ? null : h.date)} className="w-full flex items-center justify-between px-3 py-2.5">
                  <span className="text-xs font-bold" style={{ color: "#1F3A34" }}>{weekdayName(h.date)} · {h.date} · {hijriLabel(h.date)}</span>
                  <div className="flex items-center gap-2">
                    <span className="text-[11px] font-semibold" style={{ color: "#B8863B" }}>{evaluated}/{roster.length}</span>
                    <ChevronLeft size={14} style={{ color: "#B3A688", transform: open ? "rotate(-90deg)" : "none" }} />
                  </div>
                </button>
                {open && (
                  <div className="px-3 pb-3 space-y-1.5" style={{ borderTop: "1px dashed #E7DCC2" }}>
                    {roster.map((s) => {
                      const rec = h.recs[s.id];
                      if (!rec) return null;
                      if (rec.excluded) {
                        return (
                          <div key={s.id} className="flex items-center justify-between text-xs pt-1.5">
                            <span style={{ color: "#2B2620" }}>{s.name}</span>
                            <span className="font-semibold" style={{ color: "#8B3A3A" }}>مستبعد</span>
                          </div>
                        );
                      }
                      const incidents = behaviorMap[s.id] || [];
                      const behaviorThatDay = behaviorScoreForDate(incidents, h.date);
                      const total = dailyTotal(rec, behaviorThatDay);
                      return (
                        <div key={s.id} className="flex items-center justify-between text-xs pt-1.5">
                          <span style={{ color: "#2B2620" }}>{s.name}</span>
                          <span className="flex items-center gap-2">
                            {rec.attendanceCat && <span className="text-[10px]" style={{ color: CAT_COLORS[rec.attendanceCat] }}>{CAT_LABELS[rec.attendanceCat]}</span>}
                            <span className="font-bold" style={{ color: "#B8863B" }}>{total ?? "—"}/{DAILY_MAX_TOTAL}</span>
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
function LessonWeekly({ students, stage, subject }) {
  const [weekStart, setWeekStart] = useState(todayISO());
  const [reports, setReports] = useState({});
  const [exams, setExams] = useState({});
  const [loading, setLoading] = useState(true);
  const reportKey = `weekly:${stage}:${subject}:${weekStart}`;
  const examKey = `weeklyExam:${stage}:${subject}:${weekStart}`;
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);

  useEffect(() => {
    let cancelled = false; setLoading(true);
    Promise.all([storeGet(reportKey), storeGet(examKey)]).then(([r, e]) => { if (!cancelled) { setReports(r || {}); setExams(e || {}); setLoading(false); } });
    return () => { cancelled = true; };
  }, [reportKey, examKey]);

  const setReport = (studentId, val) => { const next = { ...reports, [studentId]: val }; setReports(next); storeSet(reportKey, next); };
  const setExam = (studentId, val) => { const next = { ...exams, [studentId]: val }; setExams(next); storeSet(examKey, next); };
  const resetWeek = async () => {
    const [ok1, ok2] = await Promise.all([storeSet(reportKey, {}), storeSet(examKey, {})]);
    if (ok1 && ok2) { setReports({}); setExams({}); }
  };

  return (
    <div>
      <Field label="بداية الأسبوع (السبت)"><input type="date" className={selectCls} style={selectStyle} value={weekStart} onChange={(e) => setWeekStart(e.target.value)} /></Field>
      <ResetButton label="درجات هذا الأسبوع (تقرير وامتحان)" onReset={resetWeek} />
      <p className="text-xs mb-3 flex items-center gap-1" style={{ color: "#8A7E68" }}><AlertCircle size={13} /> التقرير والامتحان الأسبوعي: أقصى درجة 20 لكل منهما.</p>
      {loading ? <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : (
        <div className="space-y-2">
          {roster.map((s) => (
            <div key={s.id} className="rounded-lg p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <span className="font-bold block mb-2" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{s.name}</span>
              <CounterRow icon={ClipboardList} label="التقرير الأسبوعي" value={reports[s.id]} onChange={(v) => setReport(s.id, v)} max={WEEKLY_REPORT_MAX} />
              <CounterRow icon={Award} label="الامتحان الأسبوعي" value={exams[s.id]} onChange={(v) => setExam(s.id, v)} max={WEEKLY_EXAM_MAX} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   لوحة الدرس — الشهري (امتحان شهري + الملخص الكامل حسب البنود ٤-٩)
--------------------------------------------------------------------- */
function LessonMonthly({ students, stage, subject }) {
  const [month, setMonth] = useState(thisMonthISO());
  const [examScores, setExamScores] = useState({});
  const [loading, setLoading] = useState(true);
  const [summaries, setSummaries] = useState({});
  const examKey = `monthly:${stage}:${subject}:${month}`;
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);
  const requestRef = React.useRef(0);
  const debounceRef = React.useRef(null);

  const setExam = (studentId, val) => {
    const next = { ...examScores, [studentId]: val };
    setExamScores(next); // تحديث فوري للحقل — لا ننتظر أي شيء هنا
    storeSet(examKey, next); // حفظ في الخلفية
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => recompute(next), 500); // إعادة الحساب بعد توقف الكتابة فقط
  };

  const recompute = useCallback(async (examOverride) => {
    const myRequestId = ++requestRef.current;
    setLoading((prev) => (examOverride ? prev : true));
    const dailyKeys = await storeList(`daily:${stage}:${subject}:`);
    const monthDailyKeys = dailyKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const dailyDocs = await Promise.all(monthDailyKeys.map((k) => storeGet(k)));

    const reportKeys = await storeList(`weekly:${stage}:${subject}:`);
    const monthReportKeys = reportKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const reportDocs = await Promise.all(monthReportKeys.map((k) => storeGet(k)));

    const wExamKeys = await storeList(`weeklyExam:${stage}:${subject}:`);
    const monthWExamKeys = wExamKeys.filter((k) => k.split(":")[3]?.startsWith(month));
    const wExamDocs = await Promise.all(monthWExamKeys.map((k) => storeGet(k)));

    const exam = examOverride || (await storeGet(examKey)) || {};

    const sums = {};
    for (const s of roster) {
      const incidents = (await storeGet(`behavior:${stage}:${subject}:${s.id}`)) || [];
      const realRecMap = {};
      monthDailyKeys.forEach((k, idx) => {
        const rec = dailyDocs[idx]?.[s.id];
        if (rec && (rec.attendance != null || rec.excluded)) realRecMap[k.split(":")[3]] = rec;
      });
      const { partVals, mubVals, behVals } = buildDailyStats(month, realRecMap, incidents);
      const dates = Object.keys(realRecMap);

      const partPct = avg(partVals) != null ? (avg(partVals) / PARTICIPATION_MAX) * 100 : null;
      const mubPct = avg(mubVals) != null ? (avg(mubVals) / MUBAHATHA_MAX) * 100 : null;
      const behPct = avg(behVals) != null ? (avg(behVals) / BEHAVIOR_DAILY_MAX) * 100 : null;

      const reportVals = reportDocs.map((d) => d?.[s.id]).filter((v) => v != null);
      const reportPct = avg(reportVals) != null ? (avg(reportVals) / WEEKLY_REPORT_MAX) * 100 : null;

      const wExamVals = wExamDocs.map((d) => d?.[s.id]).filter((v) => v != null);
      const wExamPct = avg(wExamVals) != null ? (avg(wExamVals) / WEEKLY_EXAM_MAX) * 100 : null;

      const components = [partPct, mubPct, behPct, reportPct, wExamPct].filter((v) => v != null);
      const continuous = components.length ? Math.round((components.reduce((a, b) => a + b, 0) / components.length) * 10) / 10 : null;

      const examMonthly = exam[s.id] ?? null;
      const combined = continuous != null && examMonthly != null ? Math.round((continuous + examMonthly) * 10) / 10 : null;
      const finalGrade = combined != null ? Math.round((combined / 2) * 10) / 10 : null;

      sums[s.id] = {
        partPct: partPct != null ? Math.round(partPct * 10) / 10 : null,
        mubPct: mubPct != null ? Math.round(mubPct * 10) / 10 : null,
        behPct: behPct != null ? Math.round(behPct * 10) / 10 : null,
        partOf20: partPct != null ? Math.round((partPct / 5) * 10) / 10 : 0,
        mubOf20: mubPct != null ? Math.round((mubPct / 5) * 10) / 10 : 0,
        behOf20: behPct != null ? Math.round((behPct / 5) * 10) / 10 : 0,
        reportPct: reportPct != null ? Math.round(reportPct * 10) / 10 : null,
        wExamPct: wExamPct != null ? Math.round(wExamPct * 10) / 10 : null,
        continuous, examMonthly, combined, finalGrade,
        daysCounted: dates.length, weeksReportCounted: reportVals.length, weeksExamCounted: wExamVals.length,
      };
    }
    if (myRequestId !== requestRef.current) return; // نتيجة متأخرة من طلب سابق — تُهمل حتى لا تُلغي كتابة أحدث
    setExamScores(exam);
    setSummaries(sums);
    setLoading(false);
  }, [stage, subject, month, roster, examKey]);

  useEffect(() => { recompute(); }, [recompute]);
  const resetMonth = async () => { const ok = await storeSet(examKey, {}); if (ok) { setExamScores({}); recompute({}); } };

  return (
    <div>
      <Field label="الشهر"><input type="month" className={selectCls} style={selectStyle} value={month} onChange={(e) => setMonth(e.target.value)} /></Field>
      <ResetButton label="درجات الامتحان الشهري" onReset={resetMonth} />
      {loading ? <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div> : (
        <div className="space-y-4">
          {roster.map((s) => {
            const sum = summaries[s.id] || {};
            return (
              <div key={s.id} className="rounded-xl p-3.5" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
                <div className="flex items-center justify-between mb-3">
                  <span className="font-bold text-lg" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{s.name}</span>
                  <Seal score={sum.finalGrade} max={100} />
                </div>
                <Field label="الامتحان الشهري /100">
                  <input type="number" min="0" max="100" step="1" className="w-full text-center rounded-lg px-2 py-1.5 border text-sm font-bold" style={selectStyle}
                    value={examScores[s.id] ?? ""} onChange={(e) => setExam(s.id, e.target.value === "" ? null : Number(e.target.value))} />
                </Field>

                <span className="block text-[10.5px] font-bold mb-1.5 mt-2" style={{ color: "#B8863B" }}>٤ — المجاميع الشهرية للبنود اليومية</span>
                <div className="grid grid-cols-3 gap-1.5 mb-2">
                  <StatBox label="مشاركة" value={sum.partOf20} suffix="/20" />
                  <StatBox label="مباحثة" value={sum.mubOf20} suffix="/20" />
                  <StatBox label="سلوك" value={sum.behOf20} suffix="/20" />
                </div>

                <span className="block text-[10.5px] font-bold mb-1.5" style={{ color: "#B8863B" }}>٥ — المجاميع الشهرية للأسبوعيات</span>
                <div className="grid grid-cols-2 gap-1.5 mb-2">
                  <StatBox label={`تقرير أسبوعي (${sum.weeksReportCounted || 0} تقرير)`} value={sum.reportPct} suffix="%" />
                  <StatBox label={`امتحان أسبوعي (${sum.weeksExamCounted || 0} امتحان)`} value={sum.wExamPct} suffix="%" />
                </div>

                <span className="block text-[10.5px] font-bold mb-1.5" style={{ color: "#B8863B" }}>٧ — التقييم المستمر الشهري (متوسط ما سبق)</span>
                <div className="rounded-lg py-2 text-center mb-2" style={{ background: "#1F3A34" }}>
                  <span className="font-bold text-lg" style={{ color: "#F3EAD8", fontFamily: "Amiri, serif" }}>{sum.continuous ?? "—"}{sum.continuous != null && "%"}</span>
                </div>

                <span className="block text-[10.5px] font-bold mb-1.5" style={{ color: "#B8863B" }}>٨ — المجموع الكلي (المستمر + الامتحان الشهري)</span>
                <div className="rounded-lg py-2 text-center mb-2" style={{ background: "#F3EAD8" }}>
                  <span className="font-bold text-lg" style={{ color: "#2B2620" }}>{sum.combined ?? "—"}</span>
                </div>

                <span className="block text-[10.5px] font-bold mb-1.5" style={{ color: "#B8863B" }}>٩ — الدرجة النهائية الشهرية (المجموع ÷ 2)</span>
                <div className="rounded-lg py-2.5 text-center" style={{ background: "#B8863B" }}>
                  <span className="font-bold text-xl" style={{ color: "#1F3A34", fontFamily: "Amiri, serif" }}>{sum.finalGrade ?? "—"}{sum.finalGrade != null && " / 100"}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   لوحة الدرس — الطباعة (جدول المعدلات الشهرية للطباعة الرسمية)
--------------------------------------------------------------------- */
function LessonPrint({ students, stage, subject, teacherName }) {
  const [month, setMonth] = useState(thisMonthISO());
  const [loading, setLoading] = useState(true);
  const [rows, setRows] = useState([]);
  const roster = useMemo(() => students.filter((s) => s.stage === stage), [students, stage]);
  const courseName = STAGES[stage].name;
  const hijriHeader = (() => {
    const [y, m] = month.split("-");
    const h = toHijri(new Date(`${y}-${m}-15T12:00:00`));
    return h.hm ? `${HIJRI_MONTHS[h.hm - 1]} ${h.hy}هـ` : "";
  })();

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    (async () => {
      const dailyKeys = await storeList(`daily:${stage}:${subject}:`);
      const monthDailyKeys = dailyKeys.filter((k) => k.split(":")[3]?.startsWith(month));
      const dailyDocs = await Promise.all(monthDailyKeys.map((k) => storeGet(k)));

      const reportKeys = await storeList(`weekly:${stage}:${subject}:`);
      const monthReportKeys = reportKeys.filter((k) => k.split(":")[3]?.startsWith(month));
      const reportDocs = await Promise.all(monthReportKeys.map((k) => storeGet(k)));

      const wExamKeys = await storeList(`weeklyExam:${stage}:${subject}:`);
      const monthWExamKeys = wExamKeys.filter((k) => k.split(":")[3]?.startsWith(month));
      const wExamDocs = await Promise.all(monthWExamKeys.map((k) => storeGet(k)));

      const examDoc = (await storeGet(`monthly:${stage}:${subject}:${month}`)) || {};

      const result = await Promise.all(roster.map(async (s) => {
        const incidents = (await storeGet(`behavior:${stage}:${subject}:${s.id}`)) || [];
        const realRecMap = {};
        monthDailyKeys.forEach((k, idx) => {
          const rec = dailyDocs[idx]?.[s.id];
          if (rec && (rec.attendance != null || rec.excluded)) realRecMap[k.split(":")[3]] = rec;
        });
        const { partVals, mubVals, behVals } = buildDailyStats(month, realRecMap, incidents);

        const partAvg = avg(partVals);
        const mubAvg = avg(mubVals);
        const behAvg = avg(behVals);
        const reportAvg = avg(reportDocs.map((d) => d?.[s.id]).filter((v) => v != null));
        const wExamAvg = avg(wExamDocs.map((d) => d?.[s.id]).filter((v) => v != null));
        const examMonthly = examDoc[s.id] ?? null;

        // تحويل كل بند إلى نسبة مئوية موحّدة لتصبح قابلة للجمع
        const partPct = partAvg != null ? (partAvg / PARTICIPATION_MAX) * 100 : null;
        const mubPct = mubAvg != null ? (mubAvg / MUBAHATHA_MAX) * 100 : null;
        const behPct = behAvg != null ? (behAvg / BEHAVIOR_DAILY_MAX) * 100 : null;
        const reportPct = reportAvg != null ? (reportAvg / WEEKLY_REPORT_MAX) * 100 : null;
        const wExamPct = wExamAvg != null ? (wExamAvg / WEEKLY_EXAM_MAX) * 100 : null;
        const examMonthlyPct = examMonthly; // من ١٠٠ أصلًا

        // المجموع = متوسط المتوفر من (السلوك، المشاركة، المباحثة، التقرير، الامتحان الأسبوعي) — بدون الامتحان الشهري
        const parts = { "السلوك": behPct, "المشاركة": partPct, "المباحثة": mubPct, "التقرير": reportPct, "الامتحان الأسبوعي": wExamPct };
        const sumParts = Object.values(parts).filter((v) => v != null);
        const total = sumParts.length > 0 ? Math.round((sumParts.reduce((a, b) => a + b, 0) / sumParts.length) * 10) / 10 : null;
        // الدرجة النهائية = (المجموع + درجة الامتحان الشهري) ÷ 2
        const finalGrade = total != null && examMonthlyPct != null ? Math.round(((total + examMonthlyPct) / 2) * 10) / 10 : null;

        return {
          id: s.id, name: s.name,
          partAvg: partAvg != null ? Math.round(partAvg * 10) / 10 : null,
          mubAvg: mubAvg != null ? Math.round(mubAvg * 10) / 10 : null,
          behAvg: behAvg != null ? Math.round(behAvg * 10) / 10 : null,
          wExamAvg: wExamAvg != null ? Math.round(wExamAvg * 10) / 10 : null,
          reportAvg: reportAvg != null ? Math.round(reportAvg * 10) / 10 : null,
          examMonthly, total, finalGrade,
        };
      }));
      if (!cancelled) { setRows(result); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [stage, subject, month, roster]);

  return (
    <div>
      <div className="no-print">
        <Field label="الشهر"><input type="month" className={selectCls} style={selectStyle} value={month} onChange={(e) => setMonth(e.target.value)} /></Field>
        <button onClick={() => window.print()} className="w-full py-2.5 rounded-lg font-bold text-sm mb-4" style={{ background: "#1F3A34", color: "#F3EAD8" }}>
          طباعة الجدول
        </button>
      </div>

      {loading ? (
        <div className="flex justify-center py-10"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : (
        <div id="printArea">
          <div className="text-center mb-4">
            <h2 className="font-bold text-xl mb-1" style={{ fontFamily: "Amiri, serif", color: "#1F3A34" }}>قائمة الدرجات الشهرية</h2>
            <h3 className="font-bold text-lg" style={{ fontFamily: "Amiri, serif", color: "#1F3A34" }}>{courseName}</h3>
            <p className="text-sm" style={{ color: "#7A2E2E" }}>مادة: {subject} · الأستاذ: {teacherName}</p>
            <p className="text-sm" style={{ color: "#7A2E2E" }}>{hijriHeader}</p>
          </div>
          <table className="w-full text-xs border-collapse" style={{ border: "1px solid #7A2E2E" }}>
            <thead>
              <tr style={{ background: "#1F3A34", color: "#F3EAD8" }}>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>اسم الطالب</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>المشاركة</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>المباحثة</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>السلوك</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>الامتحان الأسبوعي</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>التقرير</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>الامتحان الشهري</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>الدرجة النهائية</th>
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan={8} className="border p-3 text-center" style={{ borderColor: "#7A2E2E" }}>لا يوجد طلاب في هذه المرحلة.</td></tr>
              ) : rows.map((r, i) => (
                <tr key={r.id} style={{ background: i % 2 === 0 ? "#FBF7EE" : "#FFFFFF" }}>
                  <td className="border p-1.5 font-semibold" style={{ borderColor: "#7A2E2E", color: "#2B2620" }}>{r.name}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.partAvg ?? "—"}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.mubAvg ?? "—"}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.behAvg ?? "—"}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.wExamAvg ?? "—"}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.reportAvg ?? "—"}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.examMonthly ?? "—"}</td>
                  <td className="border p-1.5 text-center font-bold" style={{ borderColor: "#7A2E2E", background: "#F3EAD8" }}>{r.finalGrade ?? "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <p className="text-[10px] mt-3" style={{ color: "#8A7E68" }}>
            الدرجة النهائية = [متوسط المتوفر من (السلوك + المشاركة + المباحثة + التقرير + الامتحان الأسبوعي) + درجة الامتحان الشهري] ÷ ٢ (تظهر فقط إذا كانت درجة الامتحان الشهري مُدخلة).
          </p>
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   لوحة الدرس — سجل الحصص (الموضوع + رقم الصفحة + ملاحظة الإعادة)
--------------------------------------------------------------------- */
function LessonSessionLog({ stage, subject, teacherName }) {
  const [date, setDate] = useState(todayISO());
  const [topic, setTopic] = useState("");
  const [page, setPage] = useState("");
  const [note, setNote] = useState("");
  const [loading, setLoading] = useState(true);
  const [savedFlash, setSavedFlash] = useState(false);
  const [log, setLog] = useState([]);
  const [logLoading, setLogLoading] = useState(true);
  const [printMonth, setPrintMonth] = useState(thisMonthISO());
  const [printRows, setPrintRows] = useState([]);
  const [printLoading, setPrintLoading] = useState(true);
  const courseName = STAGES[stage].name;
  const key = `sessionLog:${stage}:${subject}:${date}`;
  const holiday = holidayReason(date);

  useEffect(() => {
    let cancelled = false; setLoading(true);
    storeGet(key).then(async (v) => {
      if (cancelled) return;
      if (!v && holiday) {
        // يوم عطلة بلا سجل سابق: نسجّل تلقائيًا "عطلة" في الملاحظة
        const auto = { topic: "", page: "", note: "عطلة" };
        setTopic(""); setPage(""); setNote("عطلة");
        setLoading(false);
        const ok = await storeSet(key, auto);
        if (ok && !cancelled) {
          setLog((prev) => {
            const filtered = prev.filter((r) => r.date !== date);
            return [{ date, ...auto }, ...filtered].sort((a, b) => b.date.localeCompare(a.date));
          });
        }
        return;
      }
      setTopic(v?.topic || ""); setPage(v?.page || ""); setNote(v?.note || (holiday ? "عطلة" : ""));
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [key]);

  useEffect(() => {
    let cancelled = false; setLogLoading(true);
    (async () => {
      const keys = await storeList(`sessionLog:${stage}:${subject}:`);
      const docs = await Promise.all(keys.map((k) => storeGet(k).then((d) => ({ date: k.split(":")[3], ...d }))));
      const list = docs.filter((d) => d.topic || d.page || d.note).sort((a, b) => b.date.localeCompare(a.date));
      if (!cancelled) { setLog(list); setLogLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [stage, subject, date]); // إعادة تحميل السجل أيضًا عند حفظ إدخال جديد (date يتغيّر أو نفس التاريخ يُحفظ)

  useEffect(() => {
    let cancelled = false; setPrintLoading(true);
    (async () => {
      const schoolDays = daysInMonthList(printMonth).filter((d) => isSchoolDayFull(d));
      const docs = await Promise.all(schoolDays.map((d) => storeGet(`sessionLog:${stage}:${subject}:${d}`)));
      const rows = schoolDays.map((d, i) => ({ date: d, topic: docs[i]?.topic || "", page: docs[i]?.page || "" }));
      if (!cancelled) { setPrintRows(rows); setPrintLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [stage, subject, printMonth]);

  const save = async (patch) => {
    const next = { topic, page, note, ...patch };
    setTopic(next.topic); setPage(next.page); setNote(next.note);
    const ok = await storeSet(key, next);
    if (ok) {
      setSavedFlash(true); setTimeout(() => setSavedFlash(false), 900);
      setLog((prev) => {
        const filtered = prev.filter((r) => r.date !== date);
        return [{ date, ...next }, ...filtered].sort((a, b) => b.date.localeCompare(a.date));
      });
    }
  };

  return (
    <div>
      <Field label="التاريخ">
        <input type="date" className={selectCls} style={selectStyle} value={date} onChange={(e) => setDate(e.target.value)} />
      </Field>

      <div className="rounded-xl p-3.5 mb-5" style={{ background: "#FBF7EE", border: holiday ? "1px solid #8B3A3A55" : "1px solid #E7DCC2" }}>
        <div className="flex items-center justify-between mb-3">
          <span className="font-bold" style={{ color: "#1F3A34", fontFamily: "Amiri, serif", fontSize: 16 }}>{subject}</span>
          <span className="text-xs font-semibold flex items-center gap-1" style={{ color: "#7A2E2E" }}>
            {savedFlash && <Check size={13} style={{ color: "#3F6B4F" }} />}
            <CalendarDays size={13} /> {weekdayName(date)} · {date} · {hijriLabel(date)}
          </span>
        </div>
        {holiday && (
          <div className="rounded-lg px-2.5 py-1.5 mb-3 flex items-center gap-1.5" style={{ background: "#F7E9E9" }}>
            <CalendarX size={13} style={{ color: "#8B3A3A" }} />
            <span className="text-[11px] font-semibold" style={{ color: "#8B3A3A" }}>يوم عطلة — سُجّلت الملاحظة تلقائيًا، ويمكنك تعديل الحقول إن أردت.</span>
          </div>
        )}
        {loading ? (
          <div className="flex justify-center py-6"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
        ) : (
          <>
            <Field label="الموضوع الذي وصل إليه الدرس">
              <input className={selectCls} style={selectStyle} placeholder="مثال: باب الطهارة — أحكام الماء المطلق"
                value={topic} onChange={(e) => setTopic(e.target.value)} onBlur={() => save({ topic })} />
            </Field>
            <Field label="رقم الصفحة">
              <input className={selectCls} style={selectStyle} placeholder="مثال: 42" inputMode="numeric"
                value={page} onChange={(e) => setPage(e.target.value)} onBlur={() => save({ page })} />
            </Field>
            <Field label="ملاحظة (مثلاً: أُعيد الدرس في اليوم التالي للطلاب)">
              <textarea className={selectCls} style={{ ...selectStyle, minHeight: 70, resize: "vertical" }}
                value={note} onChange={(e) => setNote(e.target.value)} onBlur={() => save({ note })} />
            </Field>
          </>
        )}
      </div>

      <span className="block text-xs font-bold mb-2" style={{ color: "#7A2E2E" }}>سجل الحصص السابقة</span>
      {logLoading ? (
        <div className="flex justify-center py-6"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : log.length === 0 ? (
        <p className="text-sm text-center py-6" style={{ color: "#8A7E68" }}>لا يوجد سجل حصص مضاف بعد.</p>
      ) : (
        <div className="space-y-2">
          {log.map((r) => (
            <div key={r.date} className="rounded-lg p-3" style={{ background: "#FBF7EE", border: "1px solid #E7DCC2" }}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs font-bold" style={{ color: "#1F3A34" }}>{weekdayName(r.date)} · {r.date}</span>
                <span className="text-[10px]" style={{ color: "#B8863B" }}>{hijriLabel(r.date)}</span>
              </div>
              {r.topic && <p className="text-sm" style={{ color: "#2B2620" }}>{r.topic}</p>}
              <div className="flex items-center gap-3 mt-1">
                {r.page && <span className="text-[11px] font-semibold" style={{ color: "#7A2E2E" }}>ص {r.page}</span>}
              </div>
              {r.note && <p className="text-[11px] mt-1 rounded px-2 py-1" style={{ background: "#F3EAD8", color: "#7A2E2E" }}>{r.note}</p>}
            </div>
          ))}
        </div>
      )}

      <div className="no-print mt-6">
        <Field label="جدول الحصص الشهري للطباعة"><input type="month" className={selectCls} style={selectStyle} value={printMonth} onChange={(e) => setPrintMonth(e.target.value)} /></Field>
        <button onClick={() => window.print()} className="w-full py-2.5 rounded-lg font-bold text-sm mb-4" style={{ background: "#1F3A34", color: "#F3EAD8" }}>
          طباعة جدول الحصص الشهري
        </button>
      </div>

      {printLoading ? (
        <div className="flex justify-center py-6"><Loader2 className="animate-spin" style={{ color: "#B8863B" }} /></div>
      ) : (
        <div id="printArea">
          <div className="text-center mb-4">
            <h2 className="font-bold text-xl mb-1" style={{ fontFamily: "Amiri, serif", color: "#1F3A34" }}>جدول متابعة الحصص الشهري</h2>
            <h3 className="font-bold text-lg" style={{ fontFamily: "Amiri, serif", color: "#1F3A34" }}>{courseName}</h3>
            <p className="text-sm" style={{ color: "#7A2E2E" }}>مادة: {subject}{teacherName ? ` · الأستاذ: ${teacherName}` : ""}</p>
          </div>
          <table className="w-full text-xs border-collapse" style={{ border: "1px solid #7A2E2E" }}>
            <thead>
              <tr style={{ background: "#1F3A34", color: "#F3EAD8" }}>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>اليوم</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>التاريخ</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>الموضوع</th>
                <th className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>الصفحة</th>
              </tr>
            </thead>
            <tbody>
              {printRows.length === 0 ? (
                <tr><td colSpan={4} className="border p-3 text-center" style={{ borderColor: "#7A2E2E" }}>لا توجد أيام دوام في هذا الشهر.</td></tr>
              ) : printRows.map((r, i) => (
                <tr key={r.date} style={{ background: i % 2 === 0 ? "#FBF7EE" : "#FFFFFF" }}>
                  <td className="border p-1.5 text-center font-semibold" style={{ borderColor: "#7A2E2E", color: "#2B2620" }}>{weekdayName(r.date)}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.date}</td>
                  <td className="border p-1.5" style={{ borderColor: "#7A2E2E" }}>{r.topic || ""}</td>
                  <td className="border p-1.5 text-center" style={{ borderColor: "#7A2E2E" }}>{r.page || ""}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

  return (
